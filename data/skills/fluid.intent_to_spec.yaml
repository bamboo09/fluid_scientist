skill_id: fluid.intent_to_spec
name: "Intent to Simulation Spec"
description: "Convert natural-language CFD research intent into auditable semantic facts and a minimal spec patch."
stage: intent
priority: 90
enabled: true
version: "2.0"
selection_keywords:
  - 流场
  - 绕流
  - 入口
  - 出口
  - 边界
  - 仿真
  - simulation
  - flow
prompt_fragment: |
  ## Intent-to-Spec rules
  - Return facts, entities, relations, ambiguities and conflicts before proposing a patch.
  - Every USER_EXPLICIT field must cite the user's exact words; do not invent values or units.
  - Evidence source labels describe where the literal quote occurs: text quoted from the current user message is always current_message, even when it confirms an older fact. Use confirmed_fact only for a quote literally present in the confirmed_facts context section.
  - Preserve the exact number and semantic type of geometry entities. A domain shape is not an obstacle.
  - Preserve spatial relations such as below, attached-to, centered-on and upstream-of.
  - Emit a minimal SimulationSpecPatch and leave all unmentioned fields untouched.
  - Mark ambiguous boundary language such as “自由出流” for clarification instead of silently choosing a solver boundary.
  - Declare unsupported requirements as capability requirements; never substitute a supported template.
