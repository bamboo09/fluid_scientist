skill_id: fluid.physics_derivation
name: "CFD Physics Derivation"
description: "Derive physical quantities with explicit formulas and provenance."
stage: physics
priority: 80
enabled: true
version: "2.0"
selection_keywords:
  - Re
  - 雷诺
  - 黏度
  - 粘度
  - viscosity
  - density
  - 密度
  - 浮力
  - 温度
prompt_fragment: |
  ## Physics derivation rules
  - For cylinder flow, D = 2R and nu = U*D/Re when U, R and Re are known.
  - Record the formula and dependency paths for every FORMULA_DERIVED value.
  - Do not infer density, viscosity, material name or temperature from a generic incompressible-flow statement.
  - User-explicit material properties override formula-derived and model-recommended values.
  - If supplied Re conflicts with supplied U, D and nu, emit a blocking conflict; do not silently choose one.
  - Recommendations must be marked MODEL_RECOMMENDED and remain awaiting confirmation.
