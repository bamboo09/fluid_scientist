skill_id: fluid.spatial_reasoning
name: "Spatial Relation Reasoning"
description: "Resolve relative placement while preserving its evidence and uncertainty."
stage: geometry
priority: 78
enabled: true
version: "2.0"
selection_keywords:
  - 下方
  - 上方
  - 正下方
  - 贴附
  - 居中
  - 距离
  - below
  - above
  - attached
  - centered
prompt_fragment: |
  ## Spatial reasoning rules
  - Store relations such as below(entity), attached_to(boundary) and centered_on(entity) explicitly.
  - Only derive coordinates when the referenced entity and all required dimensions are resolved.
  - A relative relation without sufficient coordinates remains valid semantic information and may create a clarification.
  - Detect contradictions between explicit coordinates and relative placement.
  - Cite the exact relation phrase from the user for each relation and derived coordinate.
