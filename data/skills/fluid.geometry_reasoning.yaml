skill_id: fluid.geometry_reasoning
name: "CFD Geometry Semantics"
description: "Preserve geometry identity, dimensions, topology and spatial relations."
stage: geometry
priority: 90
enabled: true
version: "2.0"
selection_keywords:
  - 圆柱
  - 矩形
  - 三角形
  - 梯形
  - 余弦钟形
  - 多边形
  - 后台阶
  - 方腔
  - cylinder
  - trapezoid
  - polygon
  - cosine_bell
compiler_hooks:
  enforce_semantic_type: "strict"
  prevent_geometry_substitution: "true"
selection_geometry:
  - cylinder
  - rectangle
  - triangle
  - trapezoid
  - polygon
  - cosine_bell
prompt_fragment: |
  ## Geometry semantic rules
  - Keep domain geometry separate from embedded or wall-attached obstacles.
  - A trapezoid has independent top_width, bottom_width and height; never collapse them into one width.
  - Do not create an entity that the user did not mention, and do not replace an unsupported shape with a familiar one.
  - Represent relationships independently from coordinates. If a coordinate is derived from a relation, mark it FORMULA_DERIVED.
  - Missing placement information is an ambiguity, not permission to guess a center.
  - For 3D scenes preserve the third dimension and 3D entity type; never route them into a 2D-only schema.
